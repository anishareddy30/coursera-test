<!-- Question No: 8
Create a dynamic and interactive webpage for a bakery using HTML, CSS, and
JavaScript. The page should feature three categories: "Breads," "Cakes," and "Pastries,"
each with a corresponding button that toggles the visibility of the menu items in that
category. Each menu category should be displayed in a card format, containing an image
and a list of specific items. The page should be styled with a gradient background,
visually appealing buttons, and box-shadow effects for the cards to create a modern and
attractive design. Implement JavaScript to handle the category toggling functionality. -->

<!DOCTYPE html>
<html>
<head>
<title>Sweet Delicious Bakery</title>

<style>

body{
background-color:#ffe5cc;
font-family:Arial;
text-align:center;
}

h1{
background-color:orange;
color:white;
padding:15px;
}

button{
background-color:blue;
color:white;
padding:10px 15px;
border:none;
margin:10px;
cursor:pointer;
border-radius:5px;
}

.card{
background:white;
width:250px;
margin:10px auto;
padding:15px;
box-shadow:0px 4px 8px gray;
display:none;
}

</style>

</head>

<body>

<h1>Welcome to our Sweet Delicious Bakery</h1>

<p>Explore our Menu</p>

<button onclick="showBread()">Show Breads</button>
<button onclick="showCake()">Show Cakes</button>
<button onclick="showPastry()">Show Pastries</button>

<div class="card" id="bread">
<h3>Freshly Baked Breads</h3>
<ul>
<li>White Bread</li>
<li>Brown Bread</li>
<li>Garlic Bread</li>
</ul>
</div>

<div class="card" id="cake">
<h3>Delicious Cakes</h3>
<ul>
<li>Chocolate Cake</li>
<li>Vanilla Cake</li>
<li>Red Velvet Cake</li>
</ul>
</div>

<div class="card" id="pastry">
<h3>Tasty Pastries</h3>
<ul>
<li>Strawberry Pastry</li>
<li>Chocolate Pastry</li>
<li>Pineapple Pastry</li>
</ul>
</div>

<script>

function showBread(){
document.getElementById("bread").style.display="block";
document.getElementById("cake").style.display="none";
document.getElementById("pastry").style.display="none";
}

function showCake(){
document.getElementById("cake").style.display="block";
document.getElementById("bread").style.display="none";
document.getElementById("pastry").style.display="none";
}

function showPastry(){
document.getElementById("pastry").style.display="block";
document.getElementById("bread").style.display="none";
document.getElementById("cake").style.display="none";
}

</script>

</body>
</html>
