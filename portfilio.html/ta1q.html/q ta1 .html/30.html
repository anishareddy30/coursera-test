<!DOCTYPE html>
<html>
<head>
<title>CSS Font Properties</title>

<style>

body{
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}

.family{
font-family:Courier;
}

.size{
font-size:25px;
}

.weight{
font-weight:bold;
}

.style{
font-style:italic;
}

.transform{
text-transform:uppercase;
}

</style>

</head>

<body>

<h1>CSS Font Properties</h1>

<p class="family">Font Family Example</p>

<p class="size">Font Size Example</p>

<p class="weight">Font Weight Example</p>

<p class="style">Font Style Example</p>

<p class="transform">Text Transform Example</p>

</body>
</html>
