<!DOCTYPE html>
<html>
<head>
<title>Image Example</title>
</head>

<body>

<h3>1. Image with no margins</h3>

<img src="image1.jpg" alt="sample image">

<p>
This is some text. This is some text. This is some text.
</p>


<h3>2. Image with top and bottom margins</h3>

<img src="image2.jpg" alt="sample image" style="margin-top:30px; margin-bottom:30px;">

<p>
This is some text. This is some text. This is some text.
</p>


<h3>3. Insert an image from another folder</h3>

<img src="images/pic.jpg" alt="image from folder" width="200">


<h3>4. Insert an image from a website</h3>

<img src="https://picsum.photos/200" alt="image from website">


</body>
</html>
