<!DOCTYPE html>
<html>
<head>
<title>Color Table</title>

<style>

table{
border-collapse:collapse;
width:40%;
margin:auto;
text-align:center;
font-size:18px;
}

td{
border:1px solid black;
padding:10px;
}

/* Row Colors */
.r1{background:red; color:white;}
.r2{background:green; color:white;}
.r3{background:yellow;}
.r4{background:blue; color:white;}
.r5{background:orange;}
.r6{background:pink;}

</style>

</head>

<body>

<table>

<tr class="r1">
<td>Red</td>
<td>Critical</td>
</tr>

<tr class="r2">
<td>Green</td>
<td>Name, Event, Location</td>
</tr>

<tr class="r3">
<td>Yellow</td>
<td>Important Point</td>
</tr>

<tr class="r4">
<td>Blue</td>
<td>Theories</td>
</tr>

<tr class="r5">
<td>Orange</td>
<td>Point of View</td>
</tr>

<tr class="r6">
<td>Pink</td>
<td>Vocabularies</td>
</tr>

</table>

</body>
</html>
