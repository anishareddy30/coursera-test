<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f8ff;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: fit-content;
            background-color: white; /* plain white background */
        }

        th, td {
            border: 1px solid black; /* black border */
            padding: 10px 15px;
            text-align: center;
            min-width: 40px;
        }

        button {
            background-color: #66bb6a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #388e3c;
        }
    </style>
</head>
<body>

    <h2>Multiplication Table Generator</h2>

    <label for="rows">Enter number of rows:</label>
    <input type="number" id="rows" value="5" min="1">
    <label for="cols">Enter number of columns:</label>
    <input type="number" id="cols" value="5" min="1">
    <br>
    <button onclick="generateTable()">Generate Table</button>

    <div id="table-container"></div>

    <script>
        function generateTable() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = parseInt(document.getElementById("cols").value);
            const container = document.getElementById("table-container");
            container.innerHTML = ""; // clear previous table

            const table = document.createElement("table");

            for (let i = 1; i <= rows; i++) {
                const tr = document.createElement("tr");
                for (let j = 1; j <= cols; j++) {
                    const td = document.createElement("td");
                    td.textContent = i * j;
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }

            container.appendChild(table);
        }
    </script>

</body>
</html>
