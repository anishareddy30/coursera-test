<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>

<style>

body{
font-family: Arial;
text-align: center;
background-color: #f2f2f2;
}

.gallery{
display:inline-block;
margin:10px;
border:2px solid gray;
width:200px;
}

.gallery img{
width:100%;
height:auto;
}

.gallery:hover{
border:2px solid black;
}

.desc{
padding:10px;
}

</style>

</head>

<body>

<h2>Image Gallery</h2>

<div class="gallery">
<img src="https://picsum.photos/200?1">
<div class="desc">Beautiful Nature</div>
</div>

<div class="gallery">
<img src="https://picsum.photos/200?2">
<div class="desc">Mountain View</div>
</div>

<div class="gallery">
<img src="https://picsum.photos/200?3">
<div class="desc">Sunset Scene</div>
</div>

<div class="gallery">
<img src="https://picsum.photos/200?4">
<div class="desc">Ocean View</div>
</div>

</body>
</html>
