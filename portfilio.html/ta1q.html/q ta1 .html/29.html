<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>

body{
background-color:pink;
font-family:Arial;
}

.container{
width:300px;
margin:100px auto;
background:#ccffcc; /* very light green */
padding:20px;
border-radius:8px;
text-align:center;
}

input[type=text], input[type=password]{
width:90%;
padding:8px;
margin:8px;
}

button{
background:green;
color:white;
border:none;
padding:8px 15px;
margin:5px;
}

.cancel{
background:green;
}

a{
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Login</h2>

<form>

<input type="text" placeholder="Username"><br>

<input type="password" placeholder="Password"><br>

<label>
<input type="checkbox"> Remember Me
</label>

<br><br>

<button type="submit">Login</button>
<button class="cancel">Cancel</button>

<br><br>

<a href="#">Forgot Password?</a>

</form>

</div>

</body>
</html>
