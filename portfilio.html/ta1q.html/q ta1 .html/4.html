<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>
body{
    background-color: purple;
    font-family: Arial;
}

table{
    background-color:#4b0082; /* dark purple bluish */
    color:white;
}
</style>

</head>

<body>

<h2 align="center" style="color:white;">STUDENT REGISTRATION FORM</h2>

<form>

<table border="1" align="center" cellpadding="8">

<tr>
<td>First Name</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Last Name</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Email ID</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female
</td>
</tr>

<tr>
<td>Address</td>
<td><textarea rows="3" cols="25"></textarea></td>
</tr>

<tr>
<td>City</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Pin Code</td>
<td><input type="number"></td>
</tr>

<tr>
<td>State</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Country</td>
<td>
<select>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>
</td>
</tr>

<tr>
<td>Hobbies</td>
<td>
<input type="checkbox"> Reading
<input type="checkbox"> Sports
<input type="checkbox"> Music
<input type="checkbox"> Dancing
</td>
</tr>

<tr>
<td>Qualification</td>
<td>

<table border="1" cellpadding="5">

<tr>
<th>Examination</th>
<th>Board</th>
<th>Percentage</th>
<th>Year of Passing</th>
</tr>

<tr>
<td>10th</td>
<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>
</tr>

<tr>
<td>12th</td>
<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>
</tr>

<tr>
<td>Graduation</td>
<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>
</tr>

<tr>
<td>Master</td>
<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>
</tr>

</table>

</td>
</tr>

<tr>
<td>Courses Applied For</td>
<td>
<input type="radio" name="course"> BCA
<input type="radio" name="course"> B.Com
<input type="radio" name="course"> BA
<input type="radio" name="course"> B.Sc
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

</body>
</html>
