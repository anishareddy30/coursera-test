<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f5e9; /* light green background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .registration-form {
            background-color: rgba(144, 238, 144, 0.3); /* faint transparent green */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        .registration-form h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2e7d32; /* darker green heading */
        }

        .registration-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2e7d32;
        }

        .registration-form input[type="text"],
        .registration-form input[type="email"],
        .registration-form input[type="password"],
        .registration-form input[type="number"],
        .registration-form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: rgba(255,255,255,0.8);
        }

        .registration-form input[type="radio"] {
            margin-right: 5px;
        }

        .terms {
            margin-bottom: 15px;
        }

        .registration-form button {
            width: 100%;
            padding: 12px;
            background-color: #66bb6a; /* green button */
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .registration-form button:hover {
            background-color: #388e3c; /* darker green on hover */
        }
    </style>
</head>
<body>

    <form class="registration-form">
        <h2>Registration Form</h2>

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your age" required>

        <label>Gender</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male" style="display:inline;">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female" style="display:inline;">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other" style="display:inline;">Other</label>

        <label for="country">Select Country</label>
        <select id="country" required>
            <option value="">--Select--</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select>

        <div class="terms">
            <input type="checkbox" id="terms" required>
            <label for="terms" style="display:inline;">I accept the Terms & Conditions</label>
        </div>

        <button type="submit">Register</button>
    </form>

</body>
</html>
