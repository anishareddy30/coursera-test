<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:350px;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
border:1px solid #ccc;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
}

button{
width:100%;
background:green;
color:white;
padding:10px;
border:none;
font-size:16px;
}

a{
color:blue;
text-decoration:underline;
}

p{
font-size:12px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form>

<label>Email</label>
<input type="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<label>Repeat Password</label>
<input type="password" placeholder="Repeat Password">

<p>By creating account you agree to 
<a href="#">Terms & Policy</a>
</p>

<button type="submit">Register</button>

<p>Already have account? <a href="#">Sign in</a></p>

</form>

</div>

</body>
</html>
