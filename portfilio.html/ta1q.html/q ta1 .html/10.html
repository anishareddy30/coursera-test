<!-- Question No: 10
Write a HTML Script using HTML and CSS tags to get following output -->

<!DOCTYPE html>
<html>
<head>
<title>MIT ADT Coffee Shop</title>

<style>

body{
font-family: Arial;
text-align:center;
background-color:#f5f5f5;
}

table{
margin:auto;
border-collapse:collapse;
width:60%;
}

th, td{
border:1px solid black;
padding:10px;
}

th{
background-color:gray;
color:white;
}

button{
background-color:brown;
color:white;
padding:8px 15px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Welcome to MIT ADT Coffee Shop</h1>

<table>

<tr>
<th>Coffee Type</th>
<th>Description</th>
<th>Price</th>
</tr>

<tr>
<td>Espresso</td>
<td>Strong and rich coffee</td>
<td>₹120</td>
</tr>

<tr>
<td>Cappuccino</td>
<td>Coffee with steamed milk foam</td>
<td>₹150</td>
</tr>

<tr>
<td>Latte</td>
<td>Smooth coffee with milk</td>
<td>₹160</td>
</tr>

<tr>
<td>Mocha</td>
<td>Coffee mixed with chocolate</td>
<td>₹180</td>
</tr>

</table>

<br><br>

<h3>Order Your Coffee</h3>

Select Coffee Type:

<select>
<option>Espresso</option>
<option>Cappuccino</option>
<option>Latte</option>
<option>Mocha</option>
</select>

<br><br>

<button>Order</button>

</body>
</html>
